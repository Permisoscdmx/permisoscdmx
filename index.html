<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Oficial de Permisos - CDMX</title>

<style>
body{margin:0;font-family:Arial;background:#f0f2f5}

/* HEADER */
.header{
background:#611232;
color:white;
padding:12px 25px;
display:flex;
align-items:center;
}
.header img{height:55px;margin-right:15px}
.header h2{margin:0;font-weight:500}

/* NAV */
.nav{background:#fff;padding:10px 25px;border-bottom:1px solid #ddd}

/* BANNER */
.banner{
background:linear-gradient(90deg,#611232,#8a1538);
color:white;
padding:40px;
text-align:center;
}

/* CONTENIDO */
.container{max-width:1000px;margin:30px auto;padding:20px}
.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1)
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#611232;
color:white;
font-weight:bold;
cursor:pointer;
}

/* ESTATUS */
.vigente{color:#0a7a0a;font-weight:bold;font-size:22px}
.vencido{color:#a30000;font-weight:bold;font-size:22px}
.pendiente{color:#d4a000;font-weight:bold;font-size:22px}

/* DOCUMENTO */
.doc{
margin-top:20px;
background:white;
border:2px solid #611232;
padding:20px;
border-radius:10px;
}
.doc-header{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #ccc;
padding-bottom:10px;
margin-bottom:15px;
}
.doc-header img{height:50px}

.doc-title{
text-align:center;
font-weight:bold;
font-size:18px;
margin-bottom:15px;
}

/* FOOTER */
.footer{background:#002f2f;color:white;padding:40px}
.footer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.icon{width:20px;fill:white;margin-right:8px}
.footer-bottom{text-align:center;margin-top:20px;border-top:1px solid #555;padding-top:10px}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/9c/Logo_CDMX.png">
<h2>Gobierno de la Ciudad de México</h2>
</div>

<div class="nav">Inicio / Consulta de permisos</div>

<div class="banner">
<h1>Consulta de Permisos de Circulación</h1>
<p>Sistema oficial de validación vehicular</p>
</div>

<div class="container">
<div class="card">

<h3>Consulta por folio</h3>

<input id="folio" placeholder="Ej: FOLIO1">
<button onclick="consultar()">Consultar</button>

<div id="resultado"></div>

</div>
</div>

<!-- FOOTER -->
<div class="footer">
<div class="footer-grid">

<div>
<h4>Gobierno CDMX</h4>
<p>Ciudad de México</p>
