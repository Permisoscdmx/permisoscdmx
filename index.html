.footer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}

function consultar(){
let f=document.getElementById('folio').value.trim();
let r=registros.find(x=>x.folio===f);

if(!r){
document.getElementById('resultado').innerHTML='<div class="invalid">FOLIO NO ENCONTRADO</div>';
return;
}

let clase = r.estatus==="vigente"?"valid":r.estatus==="vencido"?"invalid":"pending";

document.getElementById('resultado').innerHTML=`
<div class="${clase}">ESTATUS: ${r.estatus.toUpperCase()}</div>
<div class="resultado">
<b>Folio:</b> ${r.folio}<br>
<b>Nombre:</b> ${r.nombre}<br>
<b>Marca:</b> ${r.marca}<br>
<b>Línea:</b> ${r.linea}<br>
<b>Modelo:</b> ${r.modelo}<br>
<b>Serie:</b> ${r.serie}<br>
<b>Motor:</b> ${r.motor}<br>

</div>`;
